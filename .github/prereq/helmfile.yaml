# Kind prereq operators for common-library CI.
# Install: ./.github/prereq/install-all.sh
# Or:      helmfile -f .github/prereq/helmfile.yaml sync
#
# Gateway API CRDs are installed by install-gateway-api-crds.sh before sync
# (Traefik chart no longer ships them). Traefik provides the Gateway controller.
# Add future operators (Argo CD, ESO, KEDA) as releases below.

helmDefaults:
  wait: true
  timeout: 300
  createNamespace: true
  atomic: false
  cleanupOnFail: false

repositories:
  - name: traefik
    url: https://traefik.github.io/charts
  - name: jetstack
    url: https://charts.jetstack.io

releases:
  - name: traefik
    namespace: traefik
    chart: traefik/traefik
    version: 41.0.2
    labels:
      component: ingress
    values:
      - values/traefik.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args:
          - "wait"
          - "--namespace"
          - "traefik"
          - "--for=condition=available"
          - "deployment/traefik"
          - "--timeout=180s"

  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.17.2
    labels:
      component: certificates
    values:
      - values/cert-manager.yaml
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args:
          - "wait"
          - "--namespace"
          - "cert-manager"
          - "--for=condition=available"
          - "deployment/cert-manager"
          - "--timeout=180s"
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args:
          - "wait"
          - "--namespace"
          - "cert-manager"
          - "--for=condition=available"
          - "deployment/cert-manager-webhook"
          - "--timeout=180s"
      - events: ["postsync"]
        showlogs: true
        command: "kubectl"
        args:
          - "wait"
          - "--namespace"
          - "cert-manager"
          - "--for=condition=available"
          - "deployment/cert-manager-cainjector"
          - "--timeout=180s"
