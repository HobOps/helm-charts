name: Common Library Kind Testing

on:
  push:
    branches:
      - main
    paths:
      - "charts/common-library/**"
      - "scripts/compare-helm-vs-cluster.py"
      - "scripts/check-branch-name.sh"
      - "scripts/check-chart-semver.py"
      - "commitlint.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/helm-chart-testing.yml"
  pull_request:
    branches:
      - main
    paths:
      - "charts/common-library/**"
      - "scripts/compare-helm-vs-cluster.py"
      - "scripts/check-branch-name.sh"
      - "scripts/check-chart-semver.py"
      - "commitlint.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/helm-chart-testing.yml"
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       (startsWith(github.head_ref, 'feat/') ||
        startsWith(github.head_ref, 'fix/') ||
        startsWith(github.head_ref, 'revert-')))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch name
        if: github.event_name == 'pull_request'
        run: ./scripts/check-branch-name.sh "${{ github.head_ref }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install commitlint
        run: npm ci

      - name: Check conventional commits
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            npx commitlint --from "${BASE_SHA}" --to "${HEAD_SHA}" --verbose
          elif [[ "${EVENT_NAME}" == "push" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            npx commitlint --from "${BEFORE_SHA}" --to "${AFTER_SHA}" --verbose
          else
            npx commitlint --last --verbose
          fi

      - name: Check common-library Chart.yaml semver bump
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            ./scripts/check-chart-semver.py "${BASE_SHA}" "${HEAD_SHA}"
          elif [[ "${EVENT_NAME}" == "push" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            ./scripts/check-chart-semver.py "${BEFORE_SHA}" "${AFTER_SHA}"
          else
            ./scripts/check-chart-semver.py "origin/main" "HEAD" || ./scripts/check-chart-semver.py "main" "HEAD"
          fi

  kind-test:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0

      - name: Install common-library CI fixture and compare
        working-directory: charts/common-library
        run: make test_kind file=ci/Kubernetes_Deployment.yaml
