name: Common Library

on:
  # No path filters on PR: required status checks must always report for branch protection.
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - "charts/common-library/**"
      - "scripts/compare-helm-vs-cluster.py"
      - "scripts/check-branch-name.sh"
      - "scripts/check-chart-semver.py"
      - "scripts/publish_helm_charts.sh"
      - "scripts/create_github_release.sh"
      - "scripts/lintconf.yaml"
      - "commitlint.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/prereq/**"
      - ".github/workflows/common-library.yml"

concurrency:
  group: common-library-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # PR-only gates: branch name, commitlint tip, Chart.yaml semver bump
  # ---------------------------------------------------------------------------
  preflight:
    # Always run on PR so the check reports for branch protection.
    # check-branch-name.sh fails non-feat/fix/revert branches.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check branch name
        run: ./scripts/check-branch-name.sh "${{ github.head_ref }}"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install commitlint
        run: npm ci

      # Squash-and-merge only: lint the tip commit (matches the eventual squash subject).
      - name: Check conventional commits
        run: npx commitlint --last --verbose

      - name: Check common-library Chart.yaml semver bump
        run: ./scripts/check-chart-semver.py "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  # ---------------------------------------------------------------------------
  # Tests: run on PR and again on push to main (gate for publish)
  # ---------------------------------------------------------------------------
  lint:
    # PR gate + cheap post-merge sanity before publish.
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Lint and unit-test common-library
        working-directory: charts/common-library
        run: |
          set -euo pipefail
          helm lint .
          make test_all

  kind-test:
    # PR-only: branch protection should require this check before merge.
    # Re-running Kind on main is redundant once the PR already passed.
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      needs.preflight.result == 'success' &&
      needs.lint.result == 'success'
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      # Gateway API v1.5.1 needs K8s >=1.31 (CEL isIP + ValidatingAdmissionPolicy).
      - name: Create KinD cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.31.0
          kubectl_version: v1.35.0
          cluster_name: common-library-ci

      - name: Install Kind prereqs (CRDs + class stubs)
        run: ./.github/prereq/install-all.sh

      - name: Apply common-library CI fixtures and compare
        working-directory: charts/common-library
        run: make test_kind_all

  # ---------------------------------------------------------------------------
  # Publish after merge to main once lint succeeds (Kind already gated the PR).
  # ---------------------------------------------------------------------------
  publish:
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.lint.result == 'success'
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Add hobops helm repo
        run: helm repo add hobops https://hobops-helm-charts.storage.googleapis.com

      - name: Write GCP credentials
        uses: jsdaniell/create-json@4a4e510bf85e1193b9fca74074d2bf4ee26de08c # 1.1.2
        with:
          name: credentials.json
          json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Publish common-library to GCS
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials.json
          CHARTS: common-library
        run: |
          set -euo pipefail
          {
            echo "[Credentials]"
            echo "gs_service_key_file=${GOOGLE_APPLICATION_CREDENTIALS}"
          } > ~/.boto
          ./scripts/publish_helm_charts.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/create_github_release.sh common-library
