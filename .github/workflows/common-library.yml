name: Common Library

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/common-library/**"
      - "scripts/compare-helm-vs-cluster.py"
      - "scripts/check-branch-name.sh"
      - "scripts/check-chart-semver.py"
      - "scripts/publish_helm_charts.sh"
      - "scripts/create_github_release.sh"
      - "scripts/lintconf.yaml"
      - "commitlint.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/prereq/**"
      - ".github/workflows/common-library.yml"
  push:
    branches:
      - main
    paths:
      - "charts/common-library/**"
      - "scripts/compare-helm-vs-cluster.py"
      - "scripts/check-branch-name.sh"
      - "scripts/check-chart-semver.py"
      - "scripts/publish_helm_charts.sh"
      - "scripts/create_github_release.sh"
      - "scripts/lintconf.yaml"
      - "commitlint.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/prereq/**"
      - ".github/workflows/common-library.yml"

concurrency:
  group: common-library-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # PR-only gates: branch name, commitlint tip, Chart.yaml semver bump
  # ---------------------------------------------------------------------------
  preflight:
    if: >
      github.event_name == 'pull_request' &&
      (startsWith(github.head_ref, 'feat/') ||
       startsWith(github.head_ref, 'fix/') ||
       startsWith(github.head_ref, 'revert-'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check branch name
        run: ./scripts/check-branch-name.sh "${{ github.head_ref }}"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install commitlint
        run: npm ci

      # Squash-and-merge only: lint the tip commit (matches the eventual squash subject).
      - name: Check conventional commits
        run: npx commitlint --last --verbose

      - name: Check common-library Chart.yaml semver bump
        run: ./scripts/check-chart-semver.py "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  # ---------------------------------------------------------------------------
  # Tests: run on PR and again on push to main (gate for publish)
  # ---------------------------------------------------------------------------
  lint:
    if: >
      (github.event_name == 'pull_request' &&
       (startsWith(github.head_ref, 'feat/') ||
        startsWith(github.head_ref, 'fix/') ||
        startsWith(github.head_ref, 'revert-'))) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Lint and unit-test common-library
        working-directory: charts/common-library
        run: |
          set -euo pipefail
          helm lint .
          make test_all

  kind-test:
    # preflight is PR-only (skipped on main); still require it when present.
    if: >
      always() &&
      needs.lint.result == 'success' &&
      (needs.preflight.result == 'success' || needs.preflight.result == 'skipped') &&
      (
        (github.event_name == 'pull_request' &&
         (startsWith(github.head_ref, 'feat/') ||
          startsWith(github.head_ref, 'fix/') ||
          startsWith(github.head_ref, 'revert-'))) ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    needs: [preflight, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up helmfile and Helm
        uses: mamezou-tech/setup-helmfile@c04e83ec7650bf2ec910864bcb409479cf56d8e6 # v2.2.0
        with:
          helmfile-version: "v1.7.0"
          helm-version: "v3.14.4"
          install-kubectl: "no"
          install-helm: "yes"
          install-helm-plugins: "no"

      - name: Create KinD cluster
        uses: helm/kind-action@0025e74a8c7512023d06dc019c617aa3cf561fde # v1.10.0

      - name: Install Kind prereqs (Gateway CRDs + helmfile)
        run: ./.github/prereq/install-all.sh

      - name: Install common-library CI fixtures and compare
        working-directory: charts/common-library
        run: make test_kind_all

  # ---------------------------------------------------------------------------
  # Publish only after merge to main and successful tests
  # ---------------------------------------------------------------------------
  publish:
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.kind-test.result == 'success'
    runs-on: ubuntu-latest
    needs: [kind-test]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.14.4

      - name: Add hobops helm repo
        run: helm repo add hobops https://hobops-helm-charts.storage.googleapis.com

      - name: Write GCP credentials
        uses: jsdaniell/create-json@4a4e510bf85e1193b9fca74074d2bf4ee26de08c # 1.1.2
        with:
          name: credentials.json
          json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Publish common-library to GCS
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials.json
          CHARTS: common-library
        run: |
          set -euo pipefail
          {
            echo "[Credentials]"
            echo "gs_service_key_file=${GOOGLE_APPLICATION_CREDENTIALS}"
          } > ~/.boto
          ./scripts/publish_helm_charts.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/create_github_release.sh common-library
