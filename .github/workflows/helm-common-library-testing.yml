name: Common Library Kind Testing

on:
  push:
    branches:
      - main
    paths:
      - "charts/common-library/**"
      - "scripts/compare-helm-vs-cluster.py"
      - "scripts/check-branch-name.sh"
      - "scripts/check-chart-semver.py"
      - "commitlint.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/prereq/**"
      - ".github/workflows/helm-common-library-testing.yml"
  pull_request:
    branches:
      - main
    paths:
      - "charts/common-library/**"
      - "scripts/compare-helm-vs-cluster.py"
      - "scripts/check-branch-name.sh"
      - "scripts/check-chart-semver.py"
      - "commitlint.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/prereq/**"
      - ".github/workflows/helm-common-library-testing.yml"
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       (startsWith(github.head_ref, 'feat/') ||
        startsWith(github.head_ref, 'fix/') ||
        startsWith(github.head_ref, 'revert-')))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch name
        if: github.event_name == 'pull_request'
        run: ./scripts/check-branch-name.sh "${{ github.head_ref }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install commitlint
        run: npm ci

      # Squash-and-merge only: lint the tip commit (matches the eventual squash subject).
      - name: Check conventional commits
        run: npx commitlint --last --verbose

      - name: Check common-library Chart.yaml semver bump
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            ./scripts/check-chart-semver.py "${BASE_SHA}" "${HEAD_SHA}"
          elif [[ "${EVENT_NAME}" == "push" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            ./scripts/check-chart-semver.py "${BEFORE_SHA}" "${AFTER_SHA}"
          else
            ./scripts/check-chart-semver.py "origin/main" "HEAD" || ./scripts/check-chart-semver.py "main" "HEAD"
          fi

  kind-test:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Installs helmfile + Helm (kubectl comes from kind-action).
      - name: Set up helmfile and Helm
        uses: mamezou-tech/setup-helmfile@v2.2.0
        with:
          helmfile-version: "v1.7.0"
          helm-version: "v3.14.4"
          install-kubectl: "no"
          install-helm: "yes"
          install-helm-plugins: "no"

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0

      - name: Install Kind prereqs (Gateway CRDs + helmfile)
        run: ./.github/prereq/install-all.sh

      - name: Install common-library CI fixtures and compare
        working-directory: charts/common-library
        run: make test_kind_all
