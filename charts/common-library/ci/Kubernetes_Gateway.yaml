# Kind fixture for Gateway (uses Ingress/Gateway class stub from prereqs).
Gateway:
  ci-gateway:
    annotations:
      hobops.io/ci: "true"
    labels:
      app: ci-gateway
    gatewayClassName: traefik
    listeners:
