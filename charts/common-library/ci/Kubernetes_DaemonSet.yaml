# Kind-schedulable fixture for DaemonSet (+ companion Service).
DaemonSet:
  ci-daemonset:
    labels:
      app: ci-daemonset
    annotations:
      hobops.io/ci: "true"
    selectorLabels:
      app: ci-daemonset
    image:
      repository: nginx
      tag: alpine
      pullPolicy: IfNotPresent
    service:
      ports:
      - name: http
        port: 80
        protocol: TCP
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 100m
