# Kind-schedulable fixture for common-library Deployment (+ companion Service).
# Keep this minimal: no nodeSelector/affinity/tolerations/imagePullSecrets that block scheduling.
ConfigMap:
  ci-deployment-config:
    data:
      APP_ENV: ci

Secret:
  ci-deployment-secret:
    stringData:
      APP_TOKEN: ci-token

Deployment:
  ci-deployment:
    labels:
      app: ci-deployment
    annotations:
      hobops.io/ci: "true"
    selectorLabels:
      app: ci-deployment
    replicas: 1
    image:
      repository: nginx
      tag: alpine
      pullPolicy: IfNotPresent
    envFrom:
    - configMapRef:
        name: ci-deployment-config
    - secretRef:
        name: ci-deployment-secret
    env:
    - name: CI
      value: "true"
    service:
      ports:
      - name: http
        port: 80
        protocol: TCP
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 100m
