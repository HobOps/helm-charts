# Kind fixture for ClusterExternalSecret (+ companion ClusterSecretStore).
ClusterSecretStore:
  ci-clusterexternalsecret-store:
    annotations:
      hobops.io/ci: "true"
    provider:
      fake:
        data:
        - key: /ci/cluster-external
          value: kind-ci
          version: "1"

ClusterExternalSecret:
  ci-clusterexternalsecret:
    annotations:
      hobops.io/ci: "true"
    externalSecretName: ci-clusterexternalsecret
    namespaceSelector:
      matchLabels:
        hobops.io/ci: "true"
    refreshTime: 1h
    externalSecretSpec:
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: ci-clusterexternalsecret-store
      dataFrom:
      - extract:
          key: /ci/cluster-external
