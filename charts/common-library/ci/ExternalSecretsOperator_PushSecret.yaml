# Kind fixture for PushSecret (+ companion Secret and SecretStore).
Secret:
  ci-pushsecret-source:
    annotations:
      hobops.io/ci: "true"
    stringData:
      best-pokemon: pikachu

SecretStore:
  ci-pushsecret-store:
    annotations:
      hobops.io/ci: "true"
    provider:
      fake:
        data:
        - key: /ci/push
          value: unused
          version: "1"

PushSecret:
  ci-pushsecret:
    annotations:
      hobops.io/ci: "true"
    refreshInterval: 1h
    secretStoreRefs:
    - name: ci-pushsecret-store
      kind: SecretStore
    selector:
      secret:
        name: ci-pushsecret-source
    data:
    - match:
        secretKey: best-pokemon
        remoteRef:
          remoteKey: /ci/push
