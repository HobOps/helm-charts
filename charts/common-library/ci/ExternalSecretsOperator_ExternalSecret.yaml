# Kind fixture for ExternalSecret (+ companion SecretStore with fake provider).
SecretStore:
  ci-externalsecret-store:
    annotations:
      hobops.io/ci: "true"
    provider:
      fake:
        data:
        - key: /ci/external
          value: kind-ci
          version: "1"

ExternalSecret:
  ci-externalsecret:
    annotations:
      hobops.io/ci: "true"
    labels:
      app: ci-externalsecret
    refreshInterval: 1h
    secretStoreRef:
      kind: SecretStore
      name: ci-externalsecret-store
    dataFrom:
    - extract:
        key: /ci/external
