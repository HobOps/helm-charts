# Kind fixture for Argo CD ApplicationSet.
ApplicationSet:
  ci-applicationset:
    annotations:
      hobops.io/ci: "true"
    generators:
    - list:
        elements:
        - cluster: in-cluster
          url: https://kubernetes.default.svc
    template:
      metadata:
        name: ci-guestbook
      spec:
        project: default
        source:
          repoURL: https://github.com/argoproj/argocd-example-apps.git
          targetRevision: HEAD
          path: guestbook
        destination:
          server: '{{ "{{url}}" }}'
          namespace: common-library-ci
