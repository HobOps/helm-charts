{{- define "library.Keda.ScaledJob" }}
{{- $data := .Values.ScaledJob }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: {{ .name }}
  namespace: {{ .Release.Namespace }}
  {{- with (index $data .name).annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  {{- with (index $data .name).labels }}
  labels:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  {{- with (index $data .name).jobTargetRef }}
  jobTargetRef:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  {{- with (index $data .name).pollingInterval }}
  pollingInterval: {{ . }}
  {{- end }}
  {{- with (index $data .name).successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with (index $data .name).failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ . }}
  {{- end }}
  {{- with (index $data .name).envSourceContainerName }}
  envSourceContainerName: {{ . }}
  {{- end }}
  {{- with (index $data .name).minReplicaCount }}
  minReplicaCount: {{ . }}
  {{- end }}
  {{- with (index $data .name).maxReplicaCount }}
  maxReplicaCount: {{ . }}
  {{- end }}
  {{- with (index $data .name).rolloutStrategy }}
  rolloutStrategy: {{ . }}
  {{- end }}
  {{- with (index $data .name).rollout }}
  rollout:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  {{- with (index $data .name).scalingStrategy }}
  scalingStrategy:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  {{- with (index $data .name).triggers }}
  triggers:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
{{- end }}
