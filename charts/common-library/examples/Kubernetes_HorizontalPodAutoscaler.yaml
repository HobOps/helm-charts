HorizontalPodAutoscaler:
  test-hpa:
    labels:
      labels: test-hpa
    annotations:
      annotation: test-hpa
    scaleTargetRef:
      apiVersion: apps/v1
      kind: Deployment
      name: php-apache
    minReplicas: 1
    maxReplicas: 10
    metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 300
        selectPolicy: Max
        policies:
        - type: Pods
          value: 1
          periodSeconds: 60
        - type: Percent
          value: 10
          periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        selectPolicy: Max
        policies:
        - type: Pods
          value: 1
          periodSeconds: 60
        - type: Percent
          value: 10
          periodSeconds: 60
