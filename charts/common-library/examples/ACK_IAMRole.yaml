IAMRole:
  test-app-aws-iamrole:
    annotations:
      argocd.argoproj.io/sync-wave: "1"
    labels:
      app.kubernetes.io/part-of: test-app
    name: test-app-staging-test-role
    assumeRolePolicyDocument: |
      {
          "Version": "2012-10-17",
          "Statement": [
              {
                  "Effect": "Allow",
                  "Principal": {
                      "Federated": "arn:aws:iam::123456789012:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/EXAMPLE"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                      "StringEquals": {
                          "oidc.eks.us-east-1.amazonaws.com/id/EXAMPLE:aud": "sts.amazonaws.com",
                          "oidc.eks.us-east-1.amazonaws.com/id/EXAMPLE:sub": "system:serviceaccount:test-app:test-app"
                      }
                  }
              }
          ]
      }
    policies:
    - "arn:aws:iam::123456789012:policy/test-app-staging-test-policy"
    tags:
    - key: Site
      value: test-app
    - key: Managed-by
      value: kubernetes
